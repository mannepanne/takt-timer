# Takt — Cloudflare Worker configuration.
# Single Worker serves the Vite-built SPA via Workers Assets and the /api/* routes.

name = "takt"
main = "worker/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# Static SPA bundle (produced by `pnpm build` into ./dist).
# `run_worker_first = true` routes every request through the Worker so we can
# apply security headers uniformly. The Worker then delegates to the ASSETS
# binding. Bundle is tiny (~60 kB gz) so the CPU cost is negligible for Phase 1.
[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true

# Observability (stream logs via `pnpm dlx wrangler tail`).
[observability]
enabled = true

# ──────────────────────────────────────────────────────────────────────────────
# Phase-added bindings (uncomment + fill in IDs when the resource is provisioned)
# ──────────────────────────────────────────────────────────────────────────────

# D1 database — users, presets, sessions. Activated in Phase 4.
# [[d1_databases]]
# binding = "DB"
# database_name = "takt"
# database_id = "<FILL_IN_FROM_CLOUDFLARE_DASHBOARD>"

# KV — session tokens. Activated in Phase 4.
# [[kv_namespaces]]
# binding = "SESSIONS"
# id = "<FILL_IN_FROM_CLOUDFLARE_DASHBOARD>"

# KV — anonymous and authenticated rate-limit counters. Activated in Phase 3.
# [[kv_namespaces]]
# binding = "RATE_LIMITS"
# id = "<FILL_IN_FROM_CLOUDFLARE_DASHBOARD>"

# Workers AI — Whisper + Llama. Activated in Phase 3.
# [ai]
# binding = "AI"

# Custom domain is configured in the Cloudflare dashboard under
# Workers & Pages → takt → Settings → Domains & Routes. No entry needed here.
